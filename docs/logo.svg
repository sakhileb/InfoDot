<svg width="300" height="90" viewBox="0 0 300 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="18%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="90" rx="14" fill="#09090b"/>
  <rect width="300" height="90" rx="14" fill="url(#glow)"/>
  <!-- Border -->
  <rect x="1" y="1" width="298" height="88" rx="13" fill="none" stroke="#6366f1" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- Live pulse dot -->
  <circle cx="26" cy="38" r="5" fill="#6366f1">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <!-- "Dot." label -->
  <text x="40" y="33" font-family="sans-serif" font-size="10" font-weight="700" fill="#52525b" letter-spacing="2">DOT ECOSYSTEM</text>
  <!-- Platform name -->
  <text x="40" y="52" font-family="sans-serif" font-size="20" font-weight="700" fill="#6366f1">InfoDot</text>
  <!-- Subtitle -->
  <text x="40" y="70" font-family="sans-serif" font-size="10" font-weight="400" fill="#3f3f46">The Dot Ecosystem Hub</text>
</svg>
